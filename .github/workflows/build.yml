name: Build ASP.NET MVC on Windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore LaiMinhDang.SachOnline/LaiMinhDang.SachOnline.csproj -SolutionDirectory .

    - name: Build Solution
      run: msbuild LaiMinhDang.SachOnline/LaiMinhDang.SachOnline.csproj /p:Configuration=Release
